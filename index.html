<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #00ff00; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #canvas-container { position: relative; width: 90vw; height: 90vw; max-width: 400px; max-height: 400px; border: 2px solid #00ff00; box-shadow: 0 0 15px #00ff00; cursor: crosshair; }
        canvas { width: 100%; height: 100%; }
        h2 { margin-bottom: 10px; text-shadow: 0 0 5px #00ff00; }
        .instructions { font-size: 12px; margin-top: 15px; text-align: center; opacity: 0.8; }
        #status { margin-top: 10px; height: 20px; font-weight: bold; color: #fff; }
    </style>
</head>
<body>
    <h2>QUANTUM KEY HUNT</h2>
    <div id="canvas-container">
        <canvas id="hilbertCanvas"></canvas>
    </div>
    <div id="status">Выберите сектор для сканирования</div>
    <div class="instructions">Пространство ключей свернуто в кривую Гильберта.<br>Доверьтесь интуиции и укажите точку поиска.</div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Открываем на весь экран

        const canvas = document.getElementById("hilbertCanvas");
        const ctx = canvas.getContext("2d");
        
        // Устанавливаем реальное разрешение холста
        const size = 512;
        canvas.width = size;
        canvas.height = size;
        
        // Функция для отрисовки красивой сетки/фрактала
        function drawGrid() {
            ctx.fillStyle = "#001100";
            ctx.fillRect(0, 0, size, size);
            
            ctx.strokeStyle = "#004400";
            ctx.lineWidth = 1;
            
            // Рисуем сетку матрицы
            const step = size / 16;
            for(let i=0; i<size; i+=step) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, size); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(size, i); ctx.stroke();
            }
            
            // Имитация фрактала (просто визуальный эффект для старта)
            ctx.strokeStyle = "#00ff00";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(size/2, size/2, size/3, 0, Math.PI * 2);
            ctx.stroke();
        }
        
        drawGrid();

        // Обработка клика по карте
        canvas.addEventListener("click", function(e) {
            const rect = canvas.getBoundingClientRect();
            // Вычисляем процентные координаты клика (0.00 до 1.00)
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;
            
            // Визуальный эффект прицела
            drawGrid();
            ctx.fillStyle = "red";
            ctx.beginPath();
            ctx.arc(x * size, y * size, 5, 0, Math.PI * 2);
            ctx.fill();
            
            document.getElementById("status").innerText = "Координаты получены. Отправка...";
            document.getElementById("status").style.color = "red";
            
            // Вибрация телефона при клике
            tg.HapticFeedback.impactOccurred("heavy");
            
            // Отправляем координаты обратно в бота
            setTimeout(() => {
                tg.sendData(JSON.stringify({
                    action: "scan_sector",
                    x: x.toFixed(6),
                    y: y.toFixed(6)
                }));
            }, 500);
        });
    </script>
</body>
</html>
