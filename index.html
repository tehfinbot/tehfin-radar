<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; background: #010514; color: #00ccff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; touch-action: none;
        }
        #spaceCanvas { width: 100vw; height: 100vh; display: block; }
        
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none;
        }
        
        #header {
            position: absolute; top: 20px; left: 0; width: 100%; text-align: center;
            text-shadow: 0 0 10px rgba(0, 204, 255, 0.5); pointer-events: none;
        }
        h2 { margin: 0; font-size: 24px; letter-spacing: 2px;}
        .subtitle { font-size: 12px; opacity: 0.7; color: #fff; }
        
        .btn-search {
            position: absolute; bottom: 30px; right: 30px;
            background: rgba(0, 204, 255, 0.1); border: 1px solid #00ccff; color: #00ccff; 
            padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 30px;
            box-shadow: 0 0 15px rgba(0, 204, 255, 0.3); cursor: pointer; text-transform: uppercase;
            backdrop-filter: blur(5px); pointer-events: auto; transition: all 0.2s;
        }
        .btn-search:active { background: rgba(0, 204, 255, 0.3); box-shadow: 0 0 25px rgba(0, 204, 255, 0.6); transform: scale(0.95); }
        .btn-search:disabled { border-color: #555; color: #555; box-shadow: none; pointer-events: none; }
        
        .crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60vw; height: 60vw; border: 1px solid rgba(0, 204, 255, 0.3); border-radius: 20px;
            pointer-events: none; box-shadow: inset 0 0 20px rgba(0, 204, 255, 0.1);
        }
        .crosshair::before, .crosshair::after {
            content: ''; position: absolute; background: rgba(0, 204, 255, 0.5);
        }
        .crosshair::before { top: 50%; left: -10px; right: -10px; height: 1px; }
        .crosshair::after { left: 50%; top: -10px; bottom: -10px; width: 1px; }
    </style>
</head>
<body>
    <canvas id="spaceCanvas"></canvas>
    
    <div class="ui-layer">
        <div id="header">
            <h2>QUANTUM SPACE</h2>
            <div class="subtitle" id="status">Наведи сканер и нажми поиск</div>
        </div>
        <div class="crosshair"></div>
        <button id="searchBtn" class="btn-search">ПОИСК</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        const canvas = document.getElementById("spaceCanvas");
        const ctx = canvas.getContext("2d");
        const searchBtn = document.getElementById("searchBtn");
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let camera = { x: 0, y: 0, zoom: 1 };
        let velocity = { x: 0, y: 0 };
        
        let isDragging = false;
        let lastTouch = null;
        let initialPinchDistance = null;
        let initialZoom = 1;
        
        let scannedAreas = JSON.parse(localStorage.getItem('scannedAreas') || '[]');

        function pseudoRandom(x, y) {
            let h = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
            return h - Math.floor(h);
        }

        function draw() {
            ctx.fillStyle = "#010514";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            
            // Масштабируем всё пространство
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-camera.x, -camera.y);

            const viewLeft = camera.x - (canvas.width / 2) / camera.zoom;
            const viewRight = camera.x + (canvas.width / 2) / camera.zoom;
            const viewTop = camera.y - (canvas.height / 2) / camera.zoom;
            const viewBottom = camera.y + (canvas.height / 2) / camera.zoom;

            // Фрактальные процедурные звезды
            // Определяем базовый уровень масштаба
            let baseL = Math.floor(Math.log2(camera.zoom));
            
            // Рисуем 4 слоя звезд для создания эффекта бесконечного появления
            for(let l = baseL - 2; l <= baseL + 1; l++) {
                // Размер ячейки мира для этого слоя
                let gridSize = 1000 / Math.pow(2, l);
                
                // Прозрачность слоя (плавное появление и исчезновение)
                // Чем ближе зум к уровню слоя, тем он ярче
                let layerAlpha = 1 - Math.abs((Math.log2(camera.zoom) - l - 0.5));
                if (layerAlpha < 0) continue;

                let startX = Math.floor(viewLeft / gridSize) * gridSize;
                let startY = Math.floor(viewTop / gridSize) * gridSize;

                for (let x = startX; x < viewRight; x += gridSize) {
                    for (let y = startY; y < viewBottom; y += gridSize) {
                        let hash1 = pseudoRandom(x, y);
                        // Если в этой ячейке есть звезда
                        if(hash1 > 0.4) {
                            let hash2 = pseudoRandom(x + 1, y + 1);
                            let hash3 = pseudoRandom(x + 2, y + 2);
                            
                            // Смещение внутри ячейки
                            let starX = x + hash2 * gridSize;
                            let starY = y + hash3 * gridSize;
                            
                            // Звезды на разных слоях имеют разный параллакс-сдвиг
                            let depth = 1 - (hash1 * 0.5); // 0.5 - 1.0
                            
                            // Вычисляем финальные координаты с учетом микро-параллакса камеры
                            let px = starX + camera.x * (1 - depth);
                            let py = starY + camera.y * (1 - depth);

                            // Оставляем только те, что попадают в экран
                            if (px > viewLeft && px < viewRight && py > viewTop && py < viewBottom) {
                                ctx.fillStyle = `rgba(200, 230, 255, ${layerAlpha * hash1})`;
                                ctx.beginPath();
                                // Размер зависит от слоя, чтобы не превращаться в огромные блины
                                let radius = (hash2 * 2 + 0.5) / camera.zoom * Math.pow(2, l - baseL + 1);
                                ctx.arc(px, py, Math.max(0.5 / camera.zoom, radius), 0, Math.PI * 2);
                                ctx.fill();
                            }
                        }
                    }
                }
            }

            // Рисуем сетку
            ctx.strokeStyle = "rgba(0, 204, 255, 0.05)";
            ctx.lineWidth = 1 / camera.zoom;
            const mainGrid = 500; 
            const sx = Math.floor(viewLeft / mainGrid) * mainGrid;
            const sy = Math.floor(viewTop / mainGrid) * mainGrid;

            ctx.beginPath();
            for (let x = sx; x < viewRight; x += mainGrid) {
                ctx.moveTo(x, viewTop); ctx.lineTo(x, viewBottom);
            }
            for (let y = sy; y < viewBottom; y += mainGrid) {
                ctx.moveTo(viewLeft, y); ctx.lineTo(viewRight, y);
            }
            ctx.stroke();

            // Рисуем просканированные зоны
            for(let area of scannedAreas) {
                ctx.save();
                ctx.translate(area.x, area.y);
                
                let screenRadius = area.radius * camera.zoom;
                
                if (screenRadius < 10) {
                    // Если сильно отдалили - показываем как яркую золотую звезду (маяк)
                    ctx.fillStyle = "#ffaa00"; 
                    ctx.shadowBlur = 10 / camera.zoom;
                    ctx.shadowColor = "#ffaa00";
                    ctx.beginPath();
                    ctx.arc(0, 0, 5 / camera.zoom, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    // Нормальный вид при зуме (синяя туманность)
                    let grad = ctx.createRadialGradient(0, 0, 0, 0, 0, area.radius);
                    grad.addColorStop(0, 'rgba(0, 204, 255, 0.2)');
                    grad.addColorStop(1, 'rgba(0, 204, 255, 0)');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(0, 0, area.radius, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.strokeStyle = "rgba(0, 204, 255, 0.4)";
                    ctx.lineWidth = 2 / camera.zoom;
                    ctx.strokeRect(-area.radius/2, -area.radius/2, area.radius, area.radius);
                }
                ctx.restore();
            }

            ctx.restore();
        }

        function updatePhysics() {
            if(!isDragging) {
                camera.x += velocity.x;
                camera.y += velocity.y;
                velocity.x *= 0.96;
                velocity.y *= 0.96;
                if(Math.abs(velocity.x) < 0.01 / camera.zoom) velocity.x = 0;
                if(Math.abs(velocity.y) < 0.01 / camera.zoom) velocity.y = 0;
            }
            draw();
            requestAnimationFrame(updatePhysics);
        }
        updatePhysics();

        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY, time: Date.now() };
                velocity = { x: 0, y: 0 };
            } else if (e.touches.length === 2) {
                isDragging = false;
                initialPinchDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                initialZoom = camera.zoom;
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault(); 
            if (isDragging && e.touches.length === 1) {
                const currentTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY, time: Date.now() };
                const dx = currentTouch.x - lastTouch.x;
                const dy = currentTouch.y - lastTouch.y;
                const dt = currentTouch.time - lastTouch.time;
                
                camera.x -= dx / camera.zoom;
                camera.y -= dy / camera.zoom;
                
                if(dt > 0) {
                    velocity.x = -(dx / camera.zoom) / dt * 15;
                    velocity.y = -(dy / camera.zoom) / dt * 15;
                }
                lastTouch = currentTouch;
                
            } else if (e.touches.length === 2 && initialPinchDistance) {
                const currentDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                camera.zoom = Math.max(0.0001, Math.min(1000000, initialZoom * (currentDistance / initialPinchDistance)));
                
                // Форматирование зума
                let zoomText = camera.zoom < 1 ? `1:${Math.round(1/camera.zoom)}` : `${Math.round(camera.zoom)}x`;
                document.getElementById("status").innerText = `Масштаб: ${zoomText}`;
            }
        });

        canvas.addEventListener('touchend', (e) => {
            if (e.touches.length === 0) {
                isDragging = false;
                initialPinchDistance = null;
            }
        });

        searchBtn.addEventListener('click', () => {
            searchBtn.innerText = "СКАНИРОВАНИЕ...";
            searchBtn.disabled = true;
            try { tg.HapticFeedback.impactOccurred("heavy"); } catch(e){}
            
            const viewWidth = canvas.width / camera.zoom;
            const scanRadius = viewWidth * 0.4;
            
            scannedAreas.push({
                x: camera.x,
                y: camera.y,
                radius: scanRadius
            });
            if(scannedAreas.length > 100) scannedAreas.shift();
            localStorage.setItem('scannedAreas', JSON.stringify(scannedAreas));
            
            setTimeout(() => {
                tg.sendData(JSON.stringify({
                    action: "scan_viewport",
                    centerX: camera.x.toFixed(4),
                    centerY: camera.y.toFixed(4),
                    zoomLevel: camera.zoom.toFixed(4)
                }));
                setTimeout(() => {
                    searchBtn.innerText = "ПОИСК";
                    searchBtn.disabled = false;
                }, 2000);
            }, 300);
        });

    </script>
</body>
</html>
