<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; background: #050510; color: #00ff00; 
            font-family: monospace; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; height: 100vh; overflow: hidden; 
        }
        #canvas-container { 
            position: relative; width: 100vw; height: 70vh; 
            border-bottom: 2px solid #00ff00; box-shadow: 0 0 15px #00ff00; 
            cursor: crosshair; touch-action: none; 
        }
        canvas { width: 100%; height: 100%; display: block; }
        .ui-panel {
            height: 30vh; width: 100%; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-evenly; text-align: center;
            padding: 10px; box-sizing: border-box; background: #000;
        }
        h2 { margin: 0; text-shadow: 0 0 5px #00ff00; font-size: 18px;}
        .instructions { font-size: 11px; opacity: 0.8;}
        #status { font-weight: bold; color: #fff; font-size: 12px; margin-bottom: 10px;}
        .btn-scan {
            background: #00ff00; color: #000; border: none; padding: 12px 25px;
            font-size: 16px; font-weight: bold; border-radius: 8px;
            box-shadow: 0 0 10px #00ff00; cursor: pointer; text-transform: uppercase;
        }
        .btn-scan:active { background: #00cc00; box-shadow: 0 0 5px #00cc00; }
        .btn-scan:disabled { background: #333; color: #666; box-shadow: none; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="canvas-container">
        <canvas id="spaceCanvas"></canvas>
    </div>
    <div class="ui-panel">
        <h2>QUANTUM SPACE</h2>
        <div class="instructions">Перемещайте карту и масштабируйте (щипок).<br>Выберите счастливый квадрат для перебора.</div>
        <div id="status">Зум: 1.0x | Сектор не выбран</div>
        <button id="scanBtn" class="btn-scan" disabled>СКАНИРОВАТЬ СЕКТОР</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const canvas = document.getElementById("spaceCanvas");
        const ctx = canvas.getContext("2d");
        const scanBtn = document.getElementById("scanBtn");
        
        function resize() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let camera = { x: 0, y: 0, zoom: 1 };
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let initialPinchDistance = null;
        let initialZoom = 1;
        
        // Выбранный пользователем квадрат (мир. координаты)
        let selectedTarget = null; 

        function drawSpace() {
            ctx.fillStyle = "#050510";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-camera.x, -camera.y);

            ctx.strokeStyle = "rgba(0, 255, 0, 0.15)";
            ctx.lineWidth = 1 / camera.zoom;
            // Делаем ячейки сетки фиксированного размера в мире
            const gridSize = 100; 
            
            const left = camera.x - (canvas.width / 2) / camera.zoom;
            const right = camera.x + (canvas.width / 2) / camera.zoom;
            const top = camera.y - (canvas.height / 2) / camera.zoom;
            const bottom = camera.y + (canvas.height / 2) / camera.zoom;

            const startX = Math.floor(left / gridSize) * gridSize;
            const startY = Math.floor(top / gridSize) * gridSize;

            ctx.beginPath();
            for (let x = startX; x < right; x += gridSize) {
                ctx.moveTo(x, top); ctx.lineTo(x, bottom);
            }
            for (let y = startY; y < bottom; y += gridSize) {
                ctx.moveTo(left, y); ctx.lineTo(right, y);
            }
            ctx.stroke();

            // Рисуем звезды
            ctx.fillStyle = "#fff";
            for (let x = startX; x < right; x += gridSize) {
                for (let y = startY; y < bottom; y += gridSize) {
                    let hash = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
                    hash = hash - Math.floor(hash);
                    if(hash > 0.6) {
                        ctx.beginPath();
                        ctx.arc(x + gridSize/2, y + gridSize/2, (hash * 3) / camera.zoom, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
            
            // Рисуем рамку выбора (если есть)
            if (selectedTarget) {
                ctx.strokeStyle = "red";
                ctx.lineWidth = 3 / camera.zoom;
                ctx.shadowBlur = 15;
                ctx.shadowColor = "red";
                ctx.strokeRect(selectedTarget.gridX, selectedTarget.gridY, gridSize, gridSize);
                ctx.shadowBlur = 0; // сбрасываем тень
                ctx.fillStyle = "rgba(255, 0, 0, 0.2)";
                ctx.fillRect(selectedTarget.gridX, selectedTarget.gridY, gridSize, gridSize);
            }

            ctx.restore();
            
            let statusText = `Зум: ${camera.zoom.toFixed(1)}x`;
            if(selectedTarget) {
                statusText += ` | Сектор [${selectedTarget.gridX/100}, ${selectedTarget.gridY/100}]`;
            }
            document.getElementById("status").innerText = statusText;
        }

        drawSpace();

        // Touch events
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            } else if (e.touches.length === 2) {
                isDragging = false;
                initialPinchDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                initialZoom = camera.zoom;
            }
        });

        let moved = false;
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault(); 
            if (isDragging && e.touches.length === 1) {
                moved = true;
                const dx = e.touches[0].clientX - dragStart.x;
                const dy = e.touches[0].clientY - dragStart.y;
                camera.x -= dx / camera.zoom;
                camera.y -= dy / camera.zoom;
                dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                drawSpace();
            } else if (e.touches.length === 2 && initialPinchDistance) {
                moved = true;
                const currentDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                camera.zoom = Math.max(0.1, Math.min(100, initialZoom * (currentDistance / initialPinchDistance)));
                drawSpace();
            }
        });

        canvas.addEventListener('touchend', (e) => {
            if (e.touches.length === 0) {
                isDragging = false;
                initialPinchDistance = null;
            }
        });

        // Клик по карте для выбора сектора
        canvas.addEventListener('click', (e) => {
            if(moved) { moved = false; return; } // Если был свайп - не считаем за клик
            
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX - rect.left;
            const clientY = e.clientY - rect.top;

            const worldX = (clientX - canvas.width / 2) / camera.zoom + camera.x;
            const worldY = (clientY - canvas.height / 2) / camera.zoom + camera.y;

            // Вычисляем левый верхний угол "квадрата" (ячейки сетки)
            const gridSize = 100;
            const gridX = Math.floor(worldX / gridSize) * gridSize;
            const gridY = Math.floor(worldY / gridSize) * gridSize;

            selectedTarget = { gridX, gridY };
            scanBtn.disabled = false;
            
            try { tg.HapticFeedback.impactOccurred("light"); } catch(e){}
            drawSpace();
        });

        // Кнопка сканирования
        scanBtn.addEventListener('click', () => {
            if(!selectedTarget) return;
            
            scanBtn.innerText = "ОТПРАВКА...";
            scanBtn.disabled = true;
            try { tg.HapticFeedback.impactOccurred("heavy"); } catch(e){}
            
            setTimeout(() => {
                tg.sendData(JSON.stringify({
                    action: "scan_sector",
                    sectorX: selectedTarget.gridX / 100,
                    sectorY: selectedTarget.gridY / 100,
                    zoomLevel: camera.zoom.toFixed(2)
                }));
            }, 500);
        });

    </script>
</body>
</html>
